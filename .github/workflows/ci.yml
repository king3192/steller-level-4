name: RentStar CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ created ]

jobs:
  test-contracts:
    name: Test Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run RoomManager Tests
        run: |
          cd contracts/room_manager
          cargo test

      - name: Run RentSplit Tests
        run: |
          cd contracts/rent_split
          cargo test

      - name: Compile Contracts to WebAssembly
        run: |
          cd contracts/room_manager
          cargo build --target wasm32-unknown-unknown --release
          cd ../rent_split
          cargo build --target wasm32-unknown-unknown --release

  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    needs: test-contracts
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build Production Bundle
        run: npm run build
        env:
          VITE_CONTRACT_ID: "CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC"
          VITE_ROOM_MANAGER_CONTRACT_ID: "CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAFCT4"
          VITE_SOROBAN_RPC_URL: "https://soroban-testnet.stellar.org"
          VITE_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          VITE_HORIZON_URL: "https://horizon-testnet.stellar.org"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rentstar-build
          path: dist/

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'release')
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: rentstar-build
          path: dist/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: deploy-pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && contains(github.event.head_commit.message, 'release:')
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Release
        run: |
          gh release create "v${{ github.run_number }}" \
            --title "Release v${{ github.run_number }}" \
            --notes "RentStar settlement application successfully built and deployed to GitHub Pages. Live URL: https://king3192.github.io/steller-level-4/ | Run: ${{ github.run_id }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  status-report:
    name: Pipeline Status Summary
    runs-on: ubuntu-latest
    needs: [test-contracts, build-frontend, deploy-pages, release]
    if: always()
    steps:
      - name: Generate Status Summary
        run: |
          echo "# RentStar CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Smart Contract Testing | ${{ needs.test-contracts.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build & Validation | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Pages Deployment | ${{ needs.deploy-pages.result == 'skipped' && 'Skipped' || needs.deploy-pages.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release Creation | ${{ needs.release.result == 'skipped' && 'Skipped' || needs.release.result }} |" >> $GITHUB_STEP_SUMMARY
